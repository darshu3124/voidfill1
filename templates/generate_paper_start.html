{% extends "layout.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h2 class="mb-0"><i class="fas fa-file-alt mr-2"></i>Generate Question Paper</h2>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="form-group mb-4">
                            <label class="font-weight-bold">Select Subject</label>
                            <select name="subject_id" class="form-control form-control-lg custom-select" required>
                                <option value="" disabled selected>Choose a subject...</option>
                                {% for s in subjects %}
                                <option value="{{ s.id }}">{{ s.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group mb-4">
                            <label class="font-weight-bold">Number of Questions</label>
                            <input type="number" name="num_questions" class="form-control form-control-lg" min="1" max="100" placeholder="e.g. 10" required>
                            <small class="form-text text-muted">Maximum 100 questions per paper.</small>
                        </div>
                        <div class="text-center mt-5">
                            <button type="submit" class="btn btn-primary btn-lg btn-block shadow-sm">
                                Start Adding Questions <i class="fas fa-arrow-right ml-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="{{ url_for('admin_dashboard') }}" class="text-muted"><i class="fas fa-chevron-left mr-1"></i> Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>

<style>
    .card { transition: transform 0.3s; }
    .card:hover { transform: translateY(-5px); }
    .btn-primary { background: linear-gradient(135deg, #4e73df 0%, #224abe 100%); border: none; }
</style>
{% endblock %}
