{% extends "layout.html" %}
{% block content %}
<div class="container mt-5 mb-5 shadow-lg p-5 border-0 rounded-lg bg-white">
    <div class="row align-items-center mb-4">
        <div class="col-md-8">
            <h1 class="display-4 font-weight-bold text-success"><i class="fas fa-key mr-3"></i>Answer Key</h1>
            <p class="text-muted h4">Paper Code: <span class="badge badge-success px-3 py-2">{{ paper_number }}</span></p>
        </div>
        <div class="col-md-4 text-right d-print-none">
            <button onclick="window.print()" class="btn btn-success btn-lg shadow-sm mr-2"><i class="fas fa-print mr-2"></i>Print Key</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg shadow-sm">Back</a>
        </div>
    </div>

    <hr class="mb-5">

    <div class="row" id="print-area">
        {% for item in key %}
        <div class="col-md-3 col-sm-4 col-6 mb-4">
            <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-light rounded shadow-sm">
                <span class="font-weight-bold text-muted h5 mb-0">Q{{ item.q }}</span>
                <span class="badge badge-primary badge-pill px-3 py-2 h5 mb-0 font-weight-bold" style="font-size: 1.2rem;">{{ item.ans }}</span>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    @media print {
        body * { visibility: hidden; }
        #print-area, #print-area *, .display-4, .text-muted { visibility: visible; }
        #print-area { position: absolute; left: 0; top: 150px; width: 100%; }
        .row { display: flex; flex-wrap: wrap; }
        .col-md-3 { width: 25% !important; flex: 0 0 25% !important; max-width: 25% !important; }
    }
</style>
{% endblock %}
