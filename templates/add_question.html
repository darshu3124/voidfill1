{% extends "layout.html" %}
{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 shadow-sm p-5 border-0 rounded-lg bg-white">
            <h5 class="text-primary text-uppercase font-weight-bold mb-4">
                Step 2: Add Question {{ curr_idx }} of {{ total }}
                <div class="progress mt-2" style="height: 10px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: {{ (curr_idx / total) * 100 }}%"></div>
                </div>
            </h5>
            <form method="POST">
                <div class="form-group mb-5">
                    <label class="font-weight-bold text-dark h5 mb-3">Question Text</label>
                    <textarea name="q_text" class="form-control form-control-lg border-2 shadow-sm" rows="3" placeholder="Enter your question here..." required></textarea>
                </div>
                <div class="row mb-4">
                    <div class="col-md-6 mb-4">
                        <label class="font-weight-bold text-dark">Option A</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-light text-primary font-weight-bold border-right-0">A</span>
                            </div>
                            <input type="text" name="opt_a" class="form-control form-control-lg border-left-0 shadow-sm" placeholder="First choice" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="font-weight-bold text-dark">Option B</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-light text-primary font-weight-bold border-right-0">B</span>
                            </div>
                            <input type="text" name="opt_b" class="form-control form-control-lg border-left-0 shadow-sm" placeholder="Second choice" required>
                        </div>
                    </div>
                </div>
                <div class="row mb-5">
                    <div class="col-md-6 mb-4">
                        <label class="font-weight-bold text-dark">Option C</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-light text-primary font-weight-bold border-right-0">C</span>
                            </div>
                            <input type="text" name="opt_c" class="form-control form-control-lg border-left-0 shadow-sm" placeholder="Third choice" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="font-weight-bold text-dark">Option D</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-light text-primary font-weight-bold border-right-0">D</span>
                            </div>
                            <input type="text" name="opt_d" class="form-control form-control-lg border-left-0 shadow-sm" placeholder="Fourth choice" required>
                        </div>
                    </div>
                </div>
                <div class="form-group mb-5">
                    <label class="font-weight-bold text-dark h5 mb-3">Which is the correct option?</label>
                    <div class="d-flex justify-content-between">
                        <div class="flex-fill mx-1">
                            <input type="radio" name="correct_opt" id="correct_a" value="A" class="d-none" required>
                            <label for="correct_a" class="btn btn-outline-success btn-lg btn-block py-3 font-weight-bold">A</label>
                        </div>
                        <div class="flex-fill mx-1">
                            <input type="radio" name="correct_opt" id="correct_b" value="B" class="d-none">
                            <label for="correct_b" class="btn btn-outline-success btn-lg btn-block py-3 font-weight-bold">B</label>
                        </div>
                        <div class="flex-fill mx-1">
                            <input type="radio" name="correct_opt" id="correct_c" value="C" class="d-none">
                            <label for="correct_c" class="btn btn-outline-success btn-lg btn-block py-3 font-weight-bold">C</label>
                        </div>
                        <div class="flex-fill mx-1">
                            <input type="radio" name="correct_opt" id="correct_d" value="D" class="d-none">
                            <label for="correct_d" class="btn btn-outline-success btn-lg btn-block py-3 font-weight-bold">D</label>
                        </div>
                    </div>
                </div>
                <div class="text-right mt-5">
                    <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">
                        {% if curr_idx < total %} Next Question {% else %} Finalize Paper {% endif %} <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .input-group-text { border-color: #dee2e6; }
    input[type="radio"]:checked + label {
        background-color: #28a745;
        color: white;
        border-color: #28a745;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    textarea:focus, input:focus { border-color: #4e73df !important; box-shadow: 0 0 0 0.2rem rgba(78,115,223,0.1) !important; }
</style>
{% endblock %}
